[package]
name = "hearthmirror-mac-spike"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

# Throw-away spike crate for ADR 0002 validation.
# Deleted at the end of `spike-hearthmirror-mac-bridge`. Do not depend on this.

[dependencies]
napi = { version = "3", default-features = false, features = ["napi9", "async"] }
napi-derive = "3"

# macOS-only deps. Gated by [target."cfg(target_os = ...)"] so that running
# `cargo check` from a non-mac host (e.g. our CI Windows runner) does not
# attempt to fetch / build these.
#
# Spike scope intentionally avoids the objc2 family for fullscreen
# detection. We use a "frame == primary display resolution" heuristic
# (see lib.rs window::is_hearthstone_fullscreen). Real AX-based
# detection is Phase 1 work in the production hearthmirror crate.
[target."cfg(target_os = \"macos\")".dependencies]
mach2 = "0.4"
libproc = "0.14"
core-foundation = "0.10"
core-graphics = "0.25"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
