name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm cards:convert

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm --filter @hdt/desktop build
