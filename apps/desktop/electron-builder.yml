appId: com.opendecktracker.desktop
productName: OpenDeckTracker
copyright: Copyright © 2026 OpenDeckTracker. All rights reserved.
directories:
  output: release
  buildResources: build

# Native modules are pre-built by `pnpm run rebuild:native` (better-sqlite3
# via electron-rebuild) and `pnpm run prepare:native-runtime` (the napi-rs
# hearthmirror binary, copied into out/native-runtime). electron-builder's
# own @electron/rebuild pass would traverse pnpm's symlinked dependency
# tree under node_modules/.pnpm/node_modules/@emnapi/... and ENOENT on
# Windows because the symlink stat fails. Skip it — our pre-build hooks
# already produce ABI-matched binaries.
npmRebuild: false

# Files / extra resources shipped inside the installer.
files:
  - out/**/*
  - '!out/native-runtime/**/*'
  - package.json
  - from: out/native-runtime
    to: node_modules
    filter:
      - '**/*'
# Native addons cannot be loaded directly from app.asar. Keep every .node
# binary outside the archive; this covers both better-sqlite3 and the
# HearthMirror napi-rs bridge.
#
# Paths match the in-asar layout: `files:` above remaps `out/native-runtime`
# to `node_modules/`, so the hearthmirror-native addon lives at
# `node_modules/@hdt/hearthmirror-native/` inside the archive — NOT at
# `out/native-runtime/...`. Do not add an `out/native-runtime/...`
# pattern here; it would silently never match.
asarUnpack:
  - node_modules/@hdt/hearthmirror-native/*.node
  - node_modules/better-sqlite3/**/*.node

# Bundled legal artifacts. The installer surfaces LICENSE.txt as the
# click-through EULA (NSIS `license` directive below); both files land
# under app.getPath('exe')'s sibling directory at runtime so the About
# dialog can link to them.
extraResources:
  - from: ../../LICENSE.txt
    to: LICENSE.txt
  - from: ../../THIRD_PARTY_NOTICES.txt
    to: THIRD_PARTY_NOTICES.txt
  - from: ../../data/cards/generated
    to: data/cards/generated
    filter:
      - card-build.json
      - cards.all.*.json
      - cards.collectible.*.json

win:
  target:
    - target: nsis
      arch:
        - x64
    # Portable: a plain zip of the unpacked app directory. Users unzip
    # anywhere and double-click OpenDeckTracker.exe; no installer, no
    # registry writes, no uninstaller entry. Required because the
    # README's Download section advertises both forms.
    - target: zip
      arch:
        - x64
  icon: build/icon.png
  # Internal v1 packages are intentionally unsigned. This also avoids
  # winCodeSign extraction on Windows machines without symlink privileges.
  # Re-enable once a real code-signing certificate is wired.
  signAndEditExecutable: false
  # publisherName is the "Publisher" / "Verified publisher" string the
  # Windows installer displays. MUST match the CN on the code-signing
  # certificate once signing is wired (B5).
  publisherName: OpenDeckTracker
  # legalTrademarks: kept blank — there are no registered trademarks yet.
  legalTrademarks: ''

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: OpenDeckTracker-Setup-${version}.${ext}
  # Show LICENSE.txt as the EULA click-through during install. NSIS
  # auto-converts UTF-8 to the locale-appropriate format.
  license: ../../LICENSE.txt

# Auto-update feed — consumed by electron-updater in the main process
# (apps/desktop/src/main/auto-update.ts). The `generic` provider points
# at a static-file CDN that hosts the build output (latest.yml +
# .exe + .blockmap). Until a real CDN bucket is provisioned (per the
# zh-CN distribution decision in H7), this URL is a placeholder — the
# auto-update check will fail with 404, which the main process logs
# and ignores. Once provisioned, replace the URL below with the real
# bucket / domain (e.g. https://updates.opendecktracker.example/win).
publish:
  provider: generic
  url: https://updates.opendecktracker.example/win/${arch}
  channel: latest

